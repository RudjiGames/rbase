
environment:
  matrix:
    - job_name: Windows
      APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      configuration: Debug

    - job_name: Windows
      APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      configuration: Release

    - job_name: Windows
      APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      configuration: Retail

    - job_name: Linux
      APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2204
      buildcfg: debug64

    - job_name: Linux
      APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2204
      buildcfg: release64

    - job_name: Linux
      APPVEYOR_BUILD_WORKER_IMAGE: Ubuntu2204
      buildcfg: retail64

    - job_name: OSX
      APPVEYOR_BUILD_WORKER_IMAGE: macOS-sonoma
      buildcfg: debug64

    - job_name: OSX
      APPVEYOR_BUILD_WORKER_IMAGE: macOS-sonoma
      buildcfg: release64

    - job_name: OSX
      APPVEYOR_BUILD_WORKER_IMAGE: macOS-sonoma
      buildcfg: retail64
    
shallow_clone: true

for:
  
# ======================================
# Windows
# ======================================

  -
    matrix:
      only:
      - job_name: Windows
  
    init:
      - git clone https://github.com/RudjiGames/zidar zidar
      - git clone https://github.com/RudjiGames/rbase rbase
      - git clone https://github.com/unittest-cpp/unittest-cpp.git unittest-cpp
     
    install:
      - dir
      - zidar\tools\bin\windows\genie.exe --file=rbase\scripts\genie.lua vs2022
      
    build: 
      project: .zidar\windows\vs2022\rbase\projects\vs2022\rbase.sln

# ======================================
# Linux
# ======================================
  -
    matrix:
      only:
      - job_name: Linux

    init:
      - git clone https://github.com/RudjiGames/zidar zidar
      - git clone https://github.com/RudjiGames/rbase rbase
      - git clone https://github.com/bkaradzic/GENie GENie		# build GENie from source: `GLIBC_2.29' not found
      - git clone https://github.com/unittest-cpp/unittest-cpp.git unittest-cpp
      - cd GENie && make && cd ..

    install:
      - ./GENie/bin/linux/genie --file=rbase/scripts/genie.lua --gcc=linux-gcc gmake
  
    build_script:
      - cd ./.zidar/linux/linux-gcc/rbase/projects/gmake-linux-gcc
      - make config=${buildcfg}

# ======================================
# OSX
# ======================================

  -
    matrix:
      only:
      - job_name: OSX

    init:
      - git clone https://github.com/RudjiGames/zidar zidar
      - git clone https://github.com/RudjiGames/rbase rbase
      - git clone https://github.com/bkaradzic/GENie GENie  # build GENie from source: we don't know the target CPU, can't use ARM binary from 'zidar'
      - git clone https://github.com/unittest-cpp/unittest-cpp.git unittest-cpp
      - cd GENie && make && cd ..
    
    install:
      - ./GENie/bin/darwin/genie --file=rbase/scripts/genie.lua --gcc=osx-x64 gmake
    
    build_script:
      - cd ./.zidar/osx/clang/rbase/projects/gmake-osx-arm64
      - make config=${buildcfg}
